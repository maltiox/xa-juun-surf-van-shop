<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Transporte</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#1f2937;
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
    color:#374151;
}

input,select{
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
}

button{
    margin-top:25px;
    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.results{
    margin-top:30px;
}

.result-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#f9fafb;
    padding:20px;
    border-radius:10px;
    border-left:5px solid #2563eb;
}

.card h3{
    margin-bottom:10px;
    color:#111827;
}

.value{
    font-size:24px;
    font-weight:bold;
    color:#16a34a;
}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:left;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#6b7280;
}
</style>
</head>
<body>

<div class="container">

<h1>🚐 Calculadora de Costos de Transporte</h1>

<div class="form-grid">

<div class="form-group">
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div class="form-group">
<label>Vehículo</label>
<select id="vehiculo">
<option value="35">Urvan (35 km/galón)</option>
<option value="70">Yaris (70 km/galón)</option>
</select>
</div>

<div class="form-group">
<label>Kilómetros a recorrer</label>
<input type="number" id="km" placeholder="Ej. 350">
</div>

<div class="form-group">
<label>Horas estimadas</label>
<input type="number" id="horas" placeholder="Ej. 6">
</div>

<div class="form-group">
<label>Precio del galón (Q)</label>
<input type="number" step="0.01" id="precioGalon" placeholder="Pon el precio que pagasta le ultima factura">
</div>

</div>

<button onclick="calcular()">CALCULAR COSTOS</button>

<div class="results">

<div class="result-grid">

<div class="card">
<h3>Gasolina Utilizada</h3>
<div class="value" id="galones">0</div>
</div>

<div class="card">
<h3>Gasto de Gasolina</h3>
<div class="value" id="gasolina">Q0</div>
</div>

<div class="card">
<h3>Costo Fijo</h3>
<div class="value" id="costoFijo">Q0</div>
</div>

<div class="card">
<h3>Costo Total</h3>
<div class="value" id="costoTotal">Q0</div>
</div>

<div class="card">
<h3>Precio Sugerido (+90%)</h3>
<div class="value" id="precioVenta">Q0</div>
</div>

<div class="card">
<h3>Ganancia</h3>
<div class="value" id="ganancia">Q0</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Concepto</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="detalle">
</tbody>

</table>

</div>

<div class="botones">
    <button onclick="calcular()">📊 Calcular</button>

    <button onclick="location.reload()">
        🔄 Refrescar
    </button>
</div>
    
</div> <button id="btnVolver">
    ⬅ Regresar
</button>

<script>
document.getElementById("btnVolver").addEventListener("click", function(){
    window.location.href = "index.html";
});
    <div class="footer">
Sistema de Costos de Transporte
</div>
<div>
</script>
</div>

<script>

const COSTOS_POR_KM = {
 aceite:0.11,
 aceiteCaja:0.03,
 frenos:0.03,
 llantas:0.02,
 bateria:0.02,
 seguro:0.24,
 impuestos:0.04,
 depreciacion:0.40
};

function dinero(valor){
    return "Q " + valor.toFixed(2);
}

function calcular(){

    let km = parseFloat(document.getElementById("km").value) || 0;
    let horas = parseFloat(document.getElementById("horas").value) || 0;
    let precioGalon = parseFloat(document.getElementById("precioGalon").value) || 0;
    let rendimiento = parseFloat(document.getElementById("vehiculo").value);

    let galones = km / rendimiento;

    let gastoGasolina = galones * precioGalon;

    let aceite = km * COSTOS_POR_KM.aceite;
    let aceiteCaja = km * COSTOS_POR_KM.aceiteCaja;
    let frenos = km * COSTOS_POR_KM.frenos;
    let llantas = km * COSTOS_POR_KM.llantas;
    let bateria = km * COSTOS_POR_KM.bateria;
    let seguro = km * COSTOS_POR_KM.seguro;
    let impuestos = km * COSTOS_POR_KM.impuestos;
    let depreciacion = km * COSTOS_POR_KM.depreciacion;

    let costoFijo =
        aceite +
        aceiteCaja +
        frenos +
        llantas +
        bateria +
        seguro +
        impuestos +
        depreciacion;

    let costoTotal = gastoGasolina + costoFijo;

    let precioSugerido = costoTotal * 1.80;

    let ganancia = precioSugerido - costoTotal;

    let costoPorKm = costoTotal / km;

    document.getElementById("galones").innerHTML =
        galones.toFixed(2) + " gal";

    document.getElementById("gasolina").innerHTML =
        dinero(gastoGasolina);

    document.getElementById("costoFijo").innerHTML =
        dinero(costoFijo);

    document.getElementById("costoTotal").innerHTML =
        dinero(costoTotal);

    document.getElementById("precioVenta").innerHTML =
        dinero(precioSugerido);

    document.getElementById("ganancia").innerHTML =
        dinero(ganancia);

    document.getElementById("detalle").innerHTML = `
        <tr><td>Aceite Motor</td><td>${dinero(aceite)}</td></tr>
        <tr><td>Aceite Caja</td><td>${dinero(aceiteCaja)}</td></tr>
        <tr><td>Frenos</td><td>${dinero(frenos)}</td></tr>
        <tr><td>Llantas</td><td>${dinero(llantas)}</td></tr>
        <tr><td>Batería</td><td>${dinero(bateria)}</td></tr>
        <tr><td>Seguro</td><td>${dinero(seguro)}</td></tr>
        <tr><td>Impuestos</td><td>${dinero(impuestos)}</td></tr>
        <tr><td>Depreciación</td><td>${dinero(depreciacion)}</td></tr>
        <tr><td>Gasolina</td><td>${dinero(gastoGasolina)}</td></tr>
        <tr><td><strong>Costo por Km</strong></td><td><strong>${dinero(costoPorKm)}</strong></td></tr>
        <tr><td><strong>Costo Total</strong></td><td><strong>${dinero(costoTotal)}</strong></td></tr>
        <tr><td><strong>Precio Sugerido (+80%)</strong></td><td><strong>${dinero(precioSugerido)}</strong></td></tr>
        <tr><td><strong>Ganancia</strong></td><td><strong>${dinero(ganancia)}</strong></td></tr>
    `;
}

document.getElementById("fecha").value =
new Date().toISOString().split('T')[0];

</script>

</body>
</html>
